# Default configuration for the portfolio analysis.
# Anything here can be overridden on the command line (see scripts/analyze.py).

# Holdings as ticker: weight. Weights are normalized to sum to 1, so they do
# not need to add up exactly. Leave a ticker's weight out and it defaults to an
# equal share of whatever is left.
holdings:
  AAPL: 0.25
  MSFT: 0.20
  AMZN: 0.15
  JPM: 0.15
  JNJ: 0.15
  XOM: 0.10

period:
  start: "2015-01-01"
  end: "2024-12-31"

risk_free_rate: 0.02   # annualized, used for Sharpe and Sortino
